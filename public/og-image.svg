<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">S.url social preview</title>
  <desc id="desc">A social preview card for the S.url serverless URL shortener.</desc>
  <rect width="1200" height="630" fill="#0f0f1a"/>
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="#17172a" stroke="#2d2d48" stroke-width="2"/>
  <text x="120" y="185" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="#eaeaf0">S<tspan fill="#818cf8">.url</tspan></text>
  <text x="120" y="275" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="600" fill="#f8fafc">Short links with custom aliases, QR codes, expiry, and protection.</text>
  <text x="120" y="348" font-family="Inter, Arial, sans-serif" font-size="28" fill="#a5b4fc">Serverless, safe, secure, and fast.</text>
  <rect x="120" y="420" width="420" height="64" rx="12" fill="#818cf8"/>
  <text x="152" y="463" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">natsumeaoii.github.io/surl</text>
</svg>
