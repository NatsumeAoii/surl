<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>S.url - Serverless URL Shortener</title>
        <meta
            name="description"
            content="Create short, shareable links with optional custom aliases, QR codes, expiry dates, password protection, and bulk shortening."
        />
        <meta
            name="keywords"
            content="URL shortener, short links, QR code, custom alias, serverless, Google Apps Script"
        />
        <meta name="application-name" content="S.url" />
        <meta name="theme-color" content="#0f0f1a" />
        <meta name="color-scheme" content="light dark" />
        <meta name="robots" content="index,follow" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <link rel="canonical" href="https://natsumeaoii.github.io/surl/" />

        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="S.url" />
        <meta property="og:title" content="S.url - Serverless URL Shortener" />
        <meta
            property="og:description"
            content="Create short, shareable links with custom aliases, QR codes, expiry dates, password protection, and bulk shortening."
        />
        <meta property="og:url" content="https://natsumeaoii.github.io/surl/" />
        <meta property="og:image" content="https://natsumeaoii.github.io/surl/og-image.svg" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="S.url - Serverless URL Shortener" />
        <meta
            name="twitter:description"
            content="Create short, shareable links with custom aliases, QR codes, expiry dates, password protection, and bulk shortening."
        />
        <meta name="twitter:image" content="https://natsumeaoii.github.io/surl/og-image.svg" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://script.google.com" />
        <link rel="preconnect" href="https://script.googleusercontent.com" />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <style>
            #boot-fallback {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                color: #eef2f4;
                background: #101318;
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            #boot-fallback-card {
                width: min(100%, 520px);
                padding: 24px;
                background: #171b22;
                border: 1px solid #303945;
                border-radius: 8px;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
            }

            #boot-fallback h1 {
                margin: 0 0 10px;
                font-size: 24px;
                line-height: 1.2;
            }

            #boot-fallback p {
                margin: 0;
                color: #aab3bd;
                line-height: 1.6;
            }
        </style>
        <script>
            window.__surlSourceLoadFailed = function () {
                var title = document.getElementById('boot-fallback-title');
                var message = document.getElementById('boot-fallback-message');

                if (title) title.textContent = 'Deployment needs a rebuild';
                if (message) {
                    message.textContent =
                        'This page is serving the raw Vite source entry instead of the built GitHub Pages artifact. Rerun the Deploy to GitHub Pages workflow and confirm Pages uses GitHub Actions as its source.';
                }
            };
        </script>
    </head>

    <body>
        <div id="root">
            <main id="boot-fallback" aria-live="polite">
                <section id="boot-fallback-card">
                    <h1 id="boot-fallback-title">Loading S.url</h1>
                    <p id="boot-fallback-message">
                        If this message stays visible, the deployed page may still be updating.
                    </p>
                </section>
            </main>
        </div>
        <script
            type="module"
            src="/src/main.tsx?sw-clear=1"
            onerror="window.__surlSourceLoadFailed && window.__surlSourceLoadFailed()"
        ></script>
    </body>
</html>
